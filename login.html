<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Account | MIRAS BEKTAY</title>
  <link rel="stylesheet" href="Miras.css">
  <style>
    .auth-page {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 80vh;
    }
    .auth-box {
      width: 100%;
      max-width: 400px;
      padding: 40px;
      border: 1px solid var(--line);
      background: #fff;
    }
    .auth-box h2 {
      font-size: 24px;
      margin-bottom: 25px;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
    }
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .auth-form input {
      padding: 12px 15px;
      border: 1px solid var(--line);
      font-family: var(--sans);
      outline: none;
      transition: border-color 0.3s;
    }
    .auth-form input:focus {
      border-color: var(--text);
    }
    .toggle-auth {
      margin-top: 20px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <header class="header header--solid">
    <a class="logo" href="Index.html">MIRAS BEKTAY</a>
  </header>

  <main class="auth-page">
    <div class="auth-box">
      <h2 id="formTitle">Login</h2>
      
      <form class="auth-form" id="mainAuthForm">
        <input type="email" id="userEmail" placeholder="Email" required>
        <input type="password" id="userPassword" placeholder="Password" required>
        <button type="submit" class="btn btn--primary" style="background:#000; color:#fff; width: 100%;">Continue</button>
      </form>

      <p class="toggle-auth" id="toggleBtn">Don't have an account? Sign Up</p>
    </div>
  </main>

  <footer class="footer" style="padding: 40px 0; border-top: 1px solid var(--line); margin-top: 80px; text-align: center;">
    <div class="container">
      <p style="font-family: var(--font); color: var(--muted);">© 2026 MIRAS BEKTAY</p>
      <div style="margin-top: 15px;">
        <a href="services.html" style="margin: 0 10px;">Support</a>
        <a href="https://www.instagram.com/_bektaev___/" style="margin: 0 10px;">Instagram</a>
      </div>
    </div>
  </footer>

  <script>
    const form = document.getElementById('mainAuthForm');
    const title = document.getElementById('formTitle');
    const toggleBtn = document.getElementById('toggleBtn');
    let isLoginMode = true;

    // Переключение между Входом и Регистрацией
    toggleBtn.addEventListener('click', () => {
      isLoginMode = !isLoginMode;
      title.innerText = isLoginMode ? "Login" : "Sign Up";
      toggleBtn.innerText = isLoginMode ? "Don't have an account? Sign Up" : "Already have an account? Login";
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('userEmail').value;
      const pass = document.getElementById('userPassword').value;

      if (isLoginMode) {
        // Проверка входа
        const savedUser = JSON.parse(localStorage.getItem('registeredUser'));
        if (savedUser && savedUser.email === email && savedUser.password === pass) {
          localStorage.setItem('currentUser', JSON.stringify(savedUser));
          alert('Welcome back!');
          window.location.href = 'Index.html';
        } else {
          alert('Wrong email or password!');
        }
      } else {
        // Регистрация
        const newUser = { email, password: pass };
        localStorage.setItem('registeredUser', JSON.stringify(newUser));
        localStorage.setItem('currentUser', JSON.stringify(newUser));
        alert('Account created successfully!');
        window.location.href = 'Index.html';
      }
    });
  </script>
  <script src="script.js"></script>
  

  

</body>
</html>
